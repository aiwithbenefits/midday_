<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sign in to Midday</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333;">
  <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #000; margin-bottom: 20px;">Sign in to Midday</h2>
    <p style="margin-bottom: 20px;">Enter this code to complete your sign in:</p>
    <div style="background: #f5f5f5; border-radius: 8px; padding: 20px; text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 4px; margin: 30px 0;">
      {{ .Token }}
    </div>
    <p style="color: #666; font-size: 14px;">This code will expire in 1 hour.</p>
    <p style="color: #666; font-size: 14px;">If you didn't request this code, you can safely ignore this email.</p>
  </div>
</body>
</html>
